openapi: 3.1.0
info:
  title: Library API
  description: API quản lý thư viện sách trực tuyến, hỗ trợ Chủ sách và Người đọc
    theo chuẩn OpenAPI
  version: 1.0.0
servers:
- url: http://localhost:3000
  description: Development Server
paths:
  /api/v1/auth/register:
    post:
      tags:
      - Authentication
      summary: Register
      description: Đăng ký tài khoản mới
      operationId: register_api_v1_auth_register_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/login:
    post:
      tags:
      - Authentication
      summary: Login
      description: Đăng nhập hệ thống bằng Form Data (Trả Access Token qua JSON, Refresh
        qua Cookie)
      operationId: login_api_v1_auth_login_post
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Body_login_api_v1_auth_login_post'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Token'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/refresh:
    post:
      tags:
      - Authentication
      summary: Refresh
      description: Sử dụng Refresh Token chạy ngầm trong Cookie để lấy Access Token
        mới
      operationId: refresh_api_v1_auth_refresh_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Token'
  /api/v1/auth/logout:
    post:
      tags:
      - Authentication
      summary: Logout
      description: Đăng xuất, xoá Refresh Cookie
      operationId: logout_api_v1_auth_logout_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/v1/users/{id}:
    get:
      tags:
      - Users
      summary: Get User Public Info
      description: Xem thông tin công khai của người dùng
      operationId: get_user_public_info_api_v1_users__id__get
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          title: Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPublic'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/books:
    get:
      tags:
      - Books
      summary: Get Books
      description: Tìm kiếm và lấy danh sách sách
      operationId: get_books_api_v1_books_get
      parameters:
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          description: Trang hiện hành (mặc định là 1)
          default: 1
          title: Page
        description: Trang hiện hành (mặc định là 1)
      - name: size
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          description: Kích thước trang (mặc định là 20)
          default: 20
          title: Size
        description: Kích thước trang (mặc định là 20)
      - name: q
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Từ khóa tìm kiếm chung (tùy chọn)
          title: Q
        description: Từ khóa tìm kiếm chung (tùy chọn)
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResponse_BookResponse_'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - Books
      summary: Create Book
      description: Đăng sách mới
      operationId: create_book_api_v1_books_post
      security:
      - OAuth2PasswordBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookCreate'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/books/{id}:
    get:
      tags:
      - Books
      summary: Get Book
      description: Xem chi tiết cuốn sách
      operationId: get_book_api_v1_books__id__get
      parameters:
      - name: id
